version: 2
updates:
  # Frontend (Angular UI)
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      angular:
        patterns:
          - '@angular*'
          - 'ng-*'
      dev-dependencies:
        dependency-type: development

  # Responder (Go)
  - package-ecosystem: gomod
    directory: /responder
    schedule:
      interval: weekly
    labels:
      - dependencies

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci

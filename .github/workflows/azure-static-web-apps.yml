name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build (static prerender)
        run: npm run build
        working-directory: ui

      - name: Deploy
        if: env.SWA_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          # Pre-built static output; skip Oryx build.
          app_location: ui/dist/azure-speed-test/browser
          skip_app_build: true
          output_location: ''

